services:
  - type: web
    name: media-stock-summary
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.address 0.0.0.0 --server.port $PORT --server.headless true --browser.gatherUsageStats false
    healthCheckPath: /_stcore/health
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_ANALYSIS_MODEL
        value: gpt-4o
      - key: OPENAI_TRANSCRIBE_MODEL
        value: whisper-1
